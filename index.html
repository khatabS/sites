<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة تصميم المواقع الاحترافية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #219150; }
        #status-message { margin-top: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>اطلب موقعك الإلكتروني الآن</h2>
    <p style="text-align: center; color: #7f8c8d;">املأ الاستمارة وسنقوم بالتواصل معك فوراً</p>
    
    <form id="orderForm">
        <div class="form-group">
            <label>الاسم الكامل:</label>
            <input type="text" name="الاسم" required>
        </div>
        <div class="form-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" name="الايميل" required>
        </div>
        <div class="form-group">
            <label>نوع الموقع المطلوب:</label>
            <select name="نوع الموقع">
                <option value="متجر إلكتروني">متجر إلكتروني</option>
                <option value="موقع تعريفي">موقع تعريفي (Portfolio)</option>
                <option value="مدونة">مدونة شخصية</option>
            </select>
        </div>
        <div class="form-group">
            <label>تفاصيل إضافية:</label>
            <textarea name="التفاصيل" rows="4"></textarea>
        </div>
        <button type="submit" id="submitBtn">إرسال الطلب</button>
    </form>
    <div id="status-message"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxBsumr392J0b9S3UzFjHet855CbnEexAtl1AxFVuqQTwiiXReGYi5RkB_9p5DA_LiM/exec'; // ضع رابط Apps Script هنا
    const form = document.getElementById('orderForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('status-message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'جاري الإرسال...';
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.style.display = 'block';
                msg.style.color = 'green';
                msg.innerText = 'تم استلام طلبك بنجاح! سنتواصل معك قريباً.';
                form.reset();
                btn.disabled = false;
                btn.innerText = 'إرسال الطلب';
            })
            .catch(error => {
                msg.style.display = 'block';
                msg.style.color = 'red';
                msg.innerText = 'حدث خطأ، يرجى المحاولة لاحقاً.';
                btn.disabled = false;
                btn.innerText = 'إرسال الطلب';
            });
    });
</script>

</body>
</html>
